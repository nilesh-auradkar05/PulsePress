openapi: 3.1.0
info:
  title: PulsePress API
  version: 1.1.0-phase1
  summary: Event-driven publishing & subscription platform — Phase 1 contract
  description: "The PulsePress HTTP contract. This document is the **behavioral oracle** for the API:\ntests assert\
    \ against this spec, not against implementation internals (ADR-0010).\n\n## Conventions\n- **Authentication:**\
    \ Cognito-issued JWT (OAuth2 Authorization Code + PKCE), passed as\n  `Authorization: Bearer <token>`. The API\
    \ validates signature, issuer, audience, expiration.\n- **Errors:** RFC 7807 Problem Details (`application/problem+json`)\
    \ with a `correlation_id`\n  extension on every error response.\n- **Idempotency:** All commerce mutations require\
    \ `Idempotency-Key`, including subscribe, tier-change, cancel, gift, and admin recovery verbs. Replays return\
    \ the original\n  response with `Idempotency-Replayed: true`. See `IdempotencyKey` parameter and\n  `IdempotencyConflict`\
    \ error.\n- **Versioning:** URL-versioned (`/v1/...`). New non-breaking fields are additive; breaking\n  changes\
    \ increment the major version.\n- **Time:** All timestamps are RFC 3339 UTC (`2026-05-28T14:30:00Z`).\n- **Money:**\
    \ All amounts are integer cents, never floats. Currency is `USD` in Phase 1.\n- **IDs:** UUID v4 for all resource\
    \ identifiers.\n\n## Out of scope for Phase 1\nReal payments, refunds, multi-currency, multi-region, mobile-specific\
    \ endpoints,\nPhase-2 engagement (claps/comments/bookmarks), Phase-2 discovery (tags/topics/home-discovery feed/search/recommendations).\
    \ Phase-1 notification feeds remain in scope.\n"
servers:
- url: https://api.pulsepress.example/v1
  description: Production (placeholder host)
- url: http://localhost:8000/v1
  description: Local development
tags:
- name: auth
  description: Identity and session.
- name: publications
  description: Publishing context — publications (the brand/container).
- name: posts
  description: Publishing context — posts (CRUD + publish action).
- name: plans
  description: Commerce context — subscription tiers configured by the publication owner.
- name: subscriptions
  description: Commerce context — subscriber state and tier changes.
- name: gifts
  description: Commerce context — one-shot tipping.
- name: feed
  description: 'Phase-1 notification feeds: publication dashboard events and authenticated subscriber feed events.'
- name: admin
  description: Operability — failed events, retry, discard, reconciliation.
paths:
  /me:
    get:
      tags:
      - auth
      summary: Current authenticated user
      operationId: getMe
      security:
      - bearerAuth: []
      responses:
        '200':
          description: The current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                normal:
                  value:
                    id: 9c8a1a4e-9a52-4c8b-a5b2-3f49f2b40e21
                    display_name: Alex Chen
                    email: alex@example.com
                    is_admin: false
                    created_at: '2026-04-12T10:15:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /publications:
    get:
      tags:
      - publications
      summary: List active publications
      operationId: listPublications
      security:
      - bearerAuth: []
      parameters:
      - name: owner
        in: query
        required: false
        description: Set to `me` to list only active publications owned by the authenticated caller.
        schema:
          type: string
          enum:
          - me
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Paginated list of active publications
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicationList'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
      - publications
      summary: Create a new publication owned by the caller
      operationId: createPublication
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicationCreate'
            examples:
              normal:
                value:
                  handle: the-daily-byte
                  name: The Daily Byte
                  description: Software, slowly.
      responses:
        '201':
          description: Publication created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Publication'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/HandleConflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /publications/{publication_id}:
    parameters:
    - $ref: '#/components/parameters/PublicationId'
    get:
      tags:
      - publications
      summary: Publication detail (with active plans)
      operationId: getPublication
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Publication with embedded active plans
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicationDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
      - publications
      summary: Update publication profile fields (owner only)
      operationId: updatePublication
      description: Plain authenticated CRUD. May update name, description, and avatar_url only. No domain event,
        no outbox row, no idempotency key.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicationUpdate'
      responses:
        '200':
          description: Publication updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Publication'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /publications/{publication_id}/summary:
    parameters:
    - $ref: '#/components/parameters/PublicationId'
    get:
      tags:
      - publications
      summary: Cached publication summary (counts, recent activity)
      operationId: getPublicationSummary
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Cached summary (Redis-backed, short TTL)
          headers:
            X-Cache:
              schema:
                type: string
                enum:
                - HIT
                - MISS
              description: Whether the response came from cache.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicationSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /publications/{publication_id}/posts:
    parameters:
    - $ref: '#/components/parameters/PublicationId'
    get:
      tags:
      - posts
      summary: List posts for a publication
      operationId: listPosts
      description: 'Returns posts visible to the caller:

        - Always: this publication''s free, published posts.

        - If caller is the owner: also drafts and paid posts.

        - If caller has an active paid subscription: also paid published posts.

        '
      security:
      - bearerAuth: []
      parameters:
      - name: status
        in: query
        schema:
          type: string
          enum:
          - draft
          - published
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Paginated post list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags:
      - posts
      summary: Create a draft post
      operationId: createPost
      description: 'Creates a post in `draft` status. **Plain CRUD** — does NOT emit a domain event.

        Only `publish()` emits events from the publishing context.

        '
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostCreate'
      responses:
        '201':
          description: Draft created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
  /posts/{post_id}:
    parameters:
    - $ref: '#/components/parameters/PostId'
    get:
      tags:
      - posts
      summary: Get a post
      description: 'Returns full post including body if the caller is entitled to read it

        (owner, free post, or active paid subscriber). Otherwise returns post

        metadata WITHOUT body and with `entitled: false`.

        '
      operationId: getPost
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Post (body present iff entitled)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostRead'
              examples:
                entitled:
                  summary: Caller is entitled, body included
                  value:
                    id: 7f3a-...
                    entitled: true
                    visibility: paid
                    body: Full post body markdown...
                gated:
                  summary: Caller not entitled, body withheld
                  value:
                    id: 7f3a-...
                    entitled: false
                    visibility: paid
                    body: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
      - posts
      summary: Edit a post (draft or published)
      description: 'Plain CRUD — no event emission. Editing a published post does NOT re-trigger

        newsletter send. The originally-sent newsletter remains immutable in S3.

        '
      operationId: updatePost
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostUpdate'
      responses:
        '200':
          description: Updated post
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags:
      - posts
      summary: Soft-archive a post
      description: 'Sets `status=''archived''`, `archived_at=now()`. Post becomes invisible to readers

        immediately. Physical deletion occurs lazily 30 days later (ADR-0009).

        **Idempotent at the state level** — second call on an already-archived post is a no-op 200.

        '
      operationId: archivePost
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Post archived (or already was)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Post'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /posts/{post_id}/publish:
    parameters:
    - $ref: '#/components/parameters/PostId'
    post:
      tags:
      - posts
      summary: Publish a draft post (the one event-door)
      operationId: publishPost
      description: 'Transitions `draft → published`. **The single publishing transition that emits a domain

        event** (`post.published`). Writes an immutable `post_versions` snapshot and an

        outbox row in the same DB transaction.


        **State-level idempotent** — a second call when status is already `published` is a 200

        no-op returning the same payload. No `Idempotency-Key` header required.

        '
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Post published (or already was)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostPublishResult'
              examples:
                first_publish:
                  value:
                    post_id: 7f3a-...
                    status: published
                    published_at: '2026-05-28T14:30:00Z'
                    version_id: 1ab2-...
                    newsletter_status: queued
                replay:
                  summary: Already published, no-op
                  value:
                    post_id: 7f3a-...
                    status: published
                    published_at: '2026-05-28T14:30:00Z'
                    version_id: 1ab2-...
                    newsletter_status: already_processed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /publications/{publication_id}/plans:
    parameters:
    - $ref: '#/components/parameters/PublicationId'
    get:
      tags:
      - plans
      summary: List active plans for a publication
      operationId: listPlans
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Plan list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Plan'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
      - plans
      summary: Create a plan (owner only)
      operationId: createPlan
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanCreate'
      responses:
        '201':
          description: Plan created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
  /subscriptions:
    post:
      tags:
      - subscriptions
      summary: Subscribe to a publication
      operationId: createSubscription
      description: "Creates a subscription. **Money-shaped**: requires `Idempotency-Key`. For paid plans,\nthe response\
        \ body includes the full bill breakdown (author_net, platform_fee, tax,\ntotal_charged). Free plans (price\
        \ 0) still require `Idempotency-Key` and still emit `subscription.created`, but skip ledger writes.\n\n\
        Guards:\n- Caller must be authenticated.\n- Caller cannot be the publication owner (no self-subscribe).\n\
        - Caller must not already have an `active` subscription on this publication\n  (use `PATCH /subscriptions/{id}`\
        \ to change tier).\n\nOn success, emits `subscription.created` event via the outbox.\n"
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionCreate'
            examples:
              paid:
                value:
                  publication_id: ab12-...
                  plan_id: cd34-...
                  amount_cents: 500
              open_amount:
                summary: Open-amount tier, paying above the floor
                value:
                  publication_id: ab12-...
                  plan_id: ef56-...
                  amount_cents: 2500
              free:
                value:
                  publication_id: ab12-...
                  plan_id: 0a0b-...
                  amount_cents: 0
      responses:
        '201':
          description: Subscription created
          headers:
            Idempotency-Replayed:
              $ref: '#/components/headers/IdempotencyReplayed'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResult'
              examples:
                paid_first_call:
                  value:
                    subscription_id: 11aa-...
                    status: active
                    tier: paid
                    bill:
                      amount_cents: 500
                      author_net_cents: 450
                      platform_fee_cents: 50
                      tax_cents: 40
                      total_charged_cents: 540
                    period_end: '2026-06-28T14:30:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Self-subscribe or other authorization error
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                self_subscribe:
                  value:
                    type: https://pulsepress.example/problems/self-subscribe
                    title: Self-subscribe not allowed
                    status: 403
                    detail: A publication owner cannot subscribe to their own publication.
                    correlation_id: c0rr-...
        '409':
          description: Duplicate active subscription
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                already_subscribed:
                  value:
                    type: https://pulsepress.example/problems/duplicate-subscription
                    title: Subscription already active
                    status: 409
                    detail: You already have an active subscription to this publication. Use PATCH to change tier.
                    correlation_id: c0rr-...
        '422':
          description: Validation error OR idempotency conflict
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              examples:
                amount_below_plan:
                  value:
                    type: https://pulsepress.example/problems/validation
                    title: Validation failed
                    status: 422
                    detail: amount_cents (300) is below plan minimum (500).
                    field_errors:
                    - field: amount_cents
                      code: below_minimum
                    correlation_id: c0rr-...
                idempotency_conflict:
                  summary: Same key, different body
                  value:
                    type: https://pulsepress.example/problems/idempotency-conflict
                    title: Idempotency key reused with different body
                    status: 422
                    detail: This Idempotency-Key was previously used with a different request body.
                    correlation_id: c0rr-...
  /subscriptions/{subscription_id}:
    parameters:
    - $ref: '#/components/parameters/SubscriptionId'
    get:
      tags:
      - subscriptions
      summary: Get a subscription
      operationId: getSubscription
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Subscription
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
      - subscriptions
      summary: Change subscription tier
      operationId: changeTier
      description: Updates `plan_id` and `amount_cents` immediately on an active subscription. Phase 1 has no recurring
        billing and no proration, so tier change has no new ledger impact; it emits `subscription.tier_changed`
        for read models and dashboard updates. Requires `Idempotency-Key`.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionTierChange'
      responses:
        '200':
          description: Tier change recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionResult'
          headers:
            Idempotency-Replayed:
              $ref: '#/components/headers/IdempotencyReplayed'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: Subscription is not active or target plan is incompatible/inactive
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
    delete:
      tags:
      - subscriptions
      summary: Cancel a subscription
      operationId: cancelSubscription
      description: Transitions `active → canceled`. Access is retained until `period_end`; cancellation is no-renewal,
        not immediate revocation. Emits `subscription.canceled` on the first successful cancellation. Requires `Idempotency-Key`;
        same key/body replays the original response. A later cancellation attempt after the subscription is already
        canceled returns 200 no-op and emits no duplicate event.
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Subscription canceled (or already was)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subscription'
          headers:
            Idempotency-Replayed:
              $ref: '#/components/headers/IdempotencyReplayed'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
  /gifts:
    post:
      tags:
      - gifts
      summary: Send a one-time gift to a publication
      operationId: sendGift
      description: 'Money-shaped, one-shot. Requires `Idempotency-Key`. Bill breakdown identical to a

        subscription. Emits `gift.sent`. Minimum amount: 50 cents.

        '
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GiftCreate'
            examples:
              normal:
                value:
                  publication_id: ab12-...
                  amount_cents: 1000
                  message: Loved this post!
      responses:
        '201':
          description: Gift accepted
          headers:
            Idempotency-Replayed:
              $ref: '#/components/headers/IdempotencyReplayed'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GiftResult'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Cannot gift to your own publication
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          $ref: '#/components/responses/ValidationError'
  /publications/{publication_id}/events:
    parameters:
    - $ref: '#/components/parameters/PublicationId'
    get:
      tags:
      - feed
      summary: Recent notification events for a publication
      operationId: listNotificationEvents
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Recent events (newest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NotificationEvent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /publications/{publication_id}/events/stream:
    parameters:
    - $ref: '#/components/parameters/PublicationId'
    get:
      tags:
      - feed
      summary: SSE stream of real-time notification events
      operationId: streamNotificationEvents
      security:
      - bearerAuth: []
      description: 'Server-Sent Events stream. Auth required. Owner gets the full stream; subscribers get

        a public-events subset. Each event delivered as an SSE `data:` line with a JSON

        `NotificationEvent` payload.

        '
      responses:
        '200':
          description: SSE stream (Content-Type text/event-stream)
          content:
            text/event-stream:
              schema:
                type: string
                description: 'SSE stream: each event is a NotificationEvent JSON object.'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/outbox-events:
    get:
      tags:
      - admin
      summary: List outbox events (filterable)
      operationId: listOutboxEvents
      security:
      - bearerAuth: []
        adminScope: []
      parameters:
      - name: status
        in: query
        schema:
          type: string
          enum:
          - pending
          - published
          - failed
          - superseded
          - discarded
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Outbox event list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OutboxEvent'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/outbox-events/{event_id}/retry:
    parameters:
    - $ref: '#/components/parameters/EventId'
    post:
      tags:
      - admin
      summary: Retry a failed outbox event (verb 1 — safe)
      operationId: retryOutboxEvent
      security:
      - bearerAuth: []
        adminScope: []
      description: 'Resets `status` to `pending`. Poller picks up on next cycle. Worker dedupe (by

        `event_id` in `event_processing_attempts`) protects against double-application

        in the safe case where original processing partially succeeded. Writes a

        `reconciliation_log` row.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminActionRequest'
      responses:
        '200':
          description: Retry queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminActionResult'
          headers:
            Idempotency-Replayed:
              $ref: '#/components/headers/IdempotencyReplayed'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
  /admin/outbox-events/{event_id}/amend:
    parameters:
    - $ref: '#/components/parameters/EventId'
    post:
      tags:
      - admin
      summary: Amend payload and retry (verb 2 — dangerous, gated)
      operationId: amendOutboxEvent
      security:
      - bearerAuth: []
        adminScope: []
      description: '**Feature-flag-gated, off by default.** Writes a NEW outbox event with corrected payload; original
        is marked `superseded`. Requires reason plus `admin_signature` typed exactly as `AMEND <event_id>`. Writes
        a `reconciliation_log` row with full before/after state.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminAmendRequest'
      responses:
        '200':
          description: Amended event created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminActionResult'
          headers:
            Idempotency-Replayed:
              $ref: '#/components/headers/IdempotencyReplayed'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Forbidden — feature disabled OR insufficient privilege
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
  /admin/outbox-events/{event_id}/discard:
    parameters:
    - $ref: '#/components/parameters/EventId'
    post:
      tags:
      - admin
      summary: Discard a failed event with reason (verb 3 — loud)
      operationId: discardOutboxEvent
      security:
      - bearerAuth: []
        adminScope: []
      description: 'Marks the event `discarded`. Required: reason text (min 10 chars). Triggers a

        reconciliation review against the source business row (subscription/gift).

        Emits an ops alert at high signal level.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminDiscardRequest'
      responses:
        '200':
          description: Event discarded; reconciliation review opened
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminActionResult'
          headers:
            Idempotency-Replayed:
              $ref: '#/components/headers/IdempotencyReplayed'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
      parameters:
      - $ref: '#/components/parameters/IdempotencyKey'
  /admin/reconciliation:
    get:
      tags:
      - admin
      summary: Open reconciliation reviews
      operationId: listReconciliations
      security:
      - bearerAuth: []
        adminScope: []
      responses:
        '200':
          description: Pending reconciliations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReconciliationReview'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /admin/worker-attempts:
    get:
      tags:
      - admin
      summary: Recent worker processing attempts
      operationId: listWorkerAttempts
      security:
      - bearerAuth: []
        adminScope: []
      parameters:
      - name: status
        in: query
        schema:
          type: string
          enum:
          - started
          - succeeded
          - failed
      - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Attempt records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkerAttempt'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /feed/events:
    get:
      tags:
      - feed
      summary: Recent feed events for the authenticated reader
      operationId: listUserFeedEvents
      description: Returns durable per-user feed events created by worker fanout. This is not Phase-2 discovery/search;
        it is the Phase-1 subscriber notification feed.
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Reader feed events, newest first
          content:
            application/json:
              schema:
                type: object
                required:
                - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserFeedEvent'
                  next_cursor:
                    type: string
                    nullable: true
        '401':
          $ref: '#/components/responses/Unauthorized'
  /feed/events/stream:
    get:
      tags:
      - feed
      summary: SSE stream for authenticated reader feed events
      operationId: streamUserFeedEvents
      description: Server-Sent Events stream for the authenticated reader. Each SSE `data:` line is a `UserFeedEvent`
        JSON object.
      security:
      - bearerAuth: []
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Cognito-issued OAuth2 / OIDC JWT.
    adminScope:
      type: apiKey
      in: header
      name: X-Admin-Scope-Marker
      description: 'Logical marker — actual enforcement is via the `is_admin` flag on the JWT subject''s

        user record. This security entry exists so admin operations are visibly distinct in

        generated clients and so authz tests can target it.

        '
  parameters:
    PublicationId:
      name: publication_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PostId:
      name: post_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SubscriptionId:
      name: subscription_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EventId:
      name: event_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
      description: Opaque pagination cursor returned by the previous page.
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 16
        maxLength: 128
      description: 'Required on all commerce write endpoints. Replays with the same key + same body

        return the cached response with `Idempotency-Replayed: true`. Same key + different

        body returns 422 with `type=idempotency-conflict`.

        '
  responses:
    Unauthorized:
      description: Missing, expired, or invalid JWT
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            no_token:
              value:
                type: https://pulsepress.example/problems/unauthorized
                title: Unauthorized
                status: 401
                detail: Missing Authorization header.
                correlation_id: c0rr-xxxx
    Forbidden:
      description: Authenticated but not authorized for this resource/action
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Resource does not exist (or caller may not see that it does)
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    ValidationError:
      description: Request body or parameters failed validation
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    HandleConflict:
      description: Publication handle already in use
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
  schemas:
    Problem:
      description: RFC 7807 Problem Details + correlation_id extension
      type: object
      required:
      - type
      - title
      - status
      - correlation_id
      properties:
        type:
          type: string
          format: uri
          description: URI identifying the problem type
          example: https://pulsepress.example/problems/validation
        title:
          type: string
          description: Short human-readable summary
        status:
          type: integer
          minimum: 400
          maximum: 599
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence
        instance:
          type: string
          format: uri
          description: URI identifying this specific occurrence (optional)
        correlation_id:
          type: string
          description: Request correlation ID (also in `X-Correlation-Id` response header)
        field_errors:
          type: array
          description: Present on validation problems
          items:
            type: object
            required:
            - field
            - code
            properties:
              field:
                type: string
              code:
                type: string
              message:
                type: string
    User:
      type: object
      required:
      - id
      - display_name
      - is_admin
      - created_at
      properties:
        id:
          type: string
          format: uuid
        display_name:
          type: string
        email:
          type: string
          format: email
        is_admin:
          type: boolean
        created_at:
          type: string
          format: date-time
    Publication:
      type: object
      required:
      - id
      - owner_user_id
      - handle
      - name
      - is_active
      - created_at
      - updated_at
      properties:
        id:
          type: string
          format: uuid
        owner_user_id:
          type: string
          format: uuid
        handle:
          type: string
          minLength: 3
          maxLength: 32
          pattern: ^[a-z0-9-]+$
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 500
          nullable: true
        avatar_url:
          type: string
          format: uri
          nullable: true
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    PublicationCreate:
      type: object
      required:
      - handle
      - name
      properties:
        handle:
          type: string
          pattern: ^[a-z0-9-]+$
          minLength: 3
          maxLength: 32
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 500
          nullable: true
    PublicationDetail:
      allOf:
      - $ref: '#/components/schemas/Publication'
      - type: object
        properties:
          active_plans:
            type: array
            items:
              $ref: '#/components/schemas/Plan'
    PublicationList:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Publication'
        next_cursor:
          type: string
          nullable: true
    PublicationSummary:
      type: object
      required:
      - publication_id
      - subscriber_count
      - post_count
      - generated_at
      properties:
        publication_id:
          type: string
          format: uuid
        subscriber_count:
          type: integer
          minimum: 0
        post_count:
          type: integer
          minimum: 0
        recent_revenue_cents:
          type: integer
          minimum: 0
        generated_at:
          type: string
          format: date-time
    Post:
      type: object
      required:
      - id
      - publication_id
      - author_user_id
      - title
      - status
      - visibility
      - created_at
      properties:
        id:
          type: string
          format: uuid
        publication_id:
          type: string
          format: uuid
        author_user_id:
          type: string
          format: uuid
        title:
          type: string
          maxLength: 200
        slug:
          type: string
          maxLength: 100
        status:
          type: string
          enum:
          - draft
          - published
          - archived
        visibility:
          type: string
          enum:
          - free
          - paid
        published_at:
          type: string
          format: date-time
          nullable: true
        archived_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    PostRead:
      allOf:
      - $ref: '#/components/schemas/Post'
      - type: object
        required:
        - entitled
        properties:
          body:
            type: string
            nullable: true
            description: null when entitled=false
          entitled:
            type: boolean
    PostCreate:
      type: object
      required:
      - title
      - body
      - visibility
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        body:
          type: string
          minLength: 1
        visibility:
          type: string
          enum:
          - free
          - paid
    PostUpdate:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        body:
          type: string
          minLength: 1
        visibility:
          type: string
          enum:
          - free
          - paid
      minProperties: 1
      additionalProperties: false
    PostList:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Post'
        next_cursor:
          type: string
          nullable: true
    PostPublishResult:
      type: object
      required:
      - post_id
      - status
      - published_at
      - version_id
      - newsletter_status
      properties:
        post_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - published
        published_at:
          type: string
          format: date-time
        version_id:
          type: string
          format: uuid
        newsletter_status:
          type: string
          enum:
          - queued
          - already_processed
          description: queued = newsletter.send.requested emitted; already_processed = replay
    Plan:
      type: object
      required:
      - id
      - publication_id
      - name
      - monthly_price_cents
      - currency
      - is_active
      properties:
        id:
          type: string
          format: uuid
        publication_id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 50
        monthly_price_cents:
          type: integer
          minimum: 0
          description: 0 = free tier
        currency:
          type: string
          enum:
          - USD
          default: USD
        allow_open_amount:
          type: boolean
          default: false
        benefits:
          type: array
          items:
            type: string
        is_active:
          type: boolean
    PlanCreate:
      type: object
      required:
      - name
      - monthly_price_cents
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
        monthly_price_cents:
          type: integer
          minimum: 0
        allow_open_amount:
          type: boolean
          default: false
        benefits:
          type: array
          items:
            type: string
            maxLength: 200
        currency:
          type: string
          enum:
          - USD
          default: USD
    Subscription:
      type: object
      required:
      - id
      - subscriber_user_id
      - publication_id
      - plan_id
      - status
      - amount_cents
      - period_start
      - period_end
      properties:
        id:
          type: string
          format: uuid
        subscriber_user_id:
          type: string
          format: uuid
        publication_id:
          type: string
          format: uuid
        plan_id:
          type: string
          format: uuid
        amount_cents:
          type: integer
          minimum: 0
        status:
          type: string
          enum:
          - active
          - canceled
          - expired
        period_start:
          type: string
          format: date-time
        period_end:
          type: string
          format: date-time
        canceled_at:
          type: string
          format: date-time
          nullable: true
        access_until:
          type: string
          format: date-time
          nullable: true
    SubscriptionCreate:
      type: object
      required:
      - publication_id
      - plan_id
      - amount_cents
      properties:
        publication_id:
          type: string
          format: uuid
        plan_id:
          type: string
          format: uuid
        amount_cents:
          type: integer
          minimum: 0
          description: For paid plans, must be >= plan.monthly_price_cents. For free plans, must be 0.
    SubscriptionTierChange:
      type: object
      required:
      - new_plan_id
      - new_amount_cents
      properties:
        new_plan_id:
          type: string
          format: uuid
        new_amount_cents:
          type: integer
          minimum: 0
    BillBreakdown:
      type: object
      description: 'Transparent itemization. Invariant is enforced on `ledger_transactions`, not by a cross-row
        CHECK on `ledger_entries`: `author_net_cents + platform_fee_cents + tax_cents == total_charged_cents` and
        `amount_cents + tax_cents == total_charged_cents`.'
      required:
      - amount_cents
      - author_net_cents
      - platform_fee_cents
      - tax_cents
      - total_charged_cents
      properties:
        amount_cents:
          type: integer
          minimum: 0
          description: Author-set price (subscription) or gift amount
        author_net_cents:
          type: integer
          minimum: 0
        platform_fee_cents:
          type: integer
          minimum: 0
        tax_cents:
          type: integer
          minimum: 0
        total_charged_cents:
          type: integer
          minimum: 0
    SubscriptionResult:
      type: object
      required:
      - subscription_id
      - status
      - tier
      - period_end
      properties:
        subscription_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - active
          - canceled
          - expired
        tier:
          type: string
          enum:
          - free
          - paid
        bill:
          oneOf:
          - $ref: '#/components/schemas/BillBreakdown'
          - type: 'null'
            description: null for free tier
        period_end:
          type: string
          format: date-time
    GiftCreate:
      type: object
      required:
      - publication_id
      - amount_cents
      properties:
        publication_id:
          type: string
          format: uuid
        amount_cents:
          type: integer
          minimum: 50
          description: Min $0.50
        message:
          type: string
          maxLength: 280
          nullable: true
    GiftResult:
      type: object
      required:
      - gift_id
      - status
      - bill
      properties:
        gift_id:
          type: string
          format: uuid
        status:
          type: string
          enum:
          - pending
          - processed
          - failed
        bill:
          $ref: '#/components/schemas/BillBreakdown'
    NotificationEvent:
      type: object
      required:
      - id
      - publication_id
      - event_type
      - payload
      - created_at
      properties:
        id:
          type: string
          format: uuid
        publication_id:
          type: string
          format: uuid
        event_type:
          type: string
          description: 'One of: `subscription.created`, `subscription.tier_changed`, `subscription.canceled`,

            `gift.sent`, `post.published`, `newsletter.sent`, `newsletter.send.failed`,

            `ledger.transaction.recorded`. See the Event Catalog for full payload schemas.

            '
        payload:
          type: object
          description: Event-specific. See Event Catalog.
        created_at:
          type: string
          format: date-time
    OutboxEvent:
      type: object
      required:
      - id
      - event_type
      - status
      - publish_attempts
      - created_at
      properties:
        id:
          type: string
          format: uuid
        aggregate_type:
          type: string
        aggregate_id:
          type: string
          format: uuid
        event_type:
          type: string
        event_version:
          type: integer
        payload:
          type: object
        status:
          type: string
          enum:
          - pending
          - published
          - failed
          - superseded
          - discarded
        publish_attempts:
          type: integer
          minimum: 0
        last_error:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        published_at:
          type: string
          format: date-time
          nullable: true
    AdminActionRequest:
      type: object
      required:
      - reason
      properties:
        reason:
          type: string
          minLength: 10
          maxLength: 500
    AdminAmendRequest:
      allOf:
      - $ref: '#/components/schemas/AdminActionRequest'
      - type: object
        required:
        - amended_payload
        - admin_signature
        properties:
          amended_payload:
            type: object
          admin_signature:
            type: string
            description: Typed confirmation string exactly `AMEND <event_id>`. This is an operator-confirmation
              guard, not a cryptographic signature.
            pattern: ^AMEND [0-9a-fA-F-]{36}$
    AdminDiscardRequest:
      $ref: '#/components/schemas/AdminActionRequest'
    AdminActionResult:
      type: object
      required:
      - action
      - event_id
      - performed_at
      - reconciliation_log_id
      properties:
        action:
          type: string
          enum:
          - retry
          - amend
          - discard
        event_id:
          type: string
          format: uuid
        new_event_id:
          type: string
          format: uuid
          nullable: true
          description: Only for amend — id of the new outbox event.
        performed_at:
          type: string
          format: date-time
        reconciliation_log_id:
          type: string
          format: uuid
    ReconciliationReview:
      type: object
      required:
      - id
      - event_id
      - source_type
      - source_id
      - opened_at
      properties:
        id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
        source_type:
          type: string
          enum:
          - subscription
          - gift
          - post_publish
        source_id:
          type: string
          format: uuid
        opened_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time
          nullable: true
        resolution:
          type: string
          nullable: true
          enum:
          - marked_failed
          - manual_ledger_entry
          - re_emitted
    WorkerAttempt:
      type: object
      required:
      - id
      - event_id
      - event_type
      - status
      - attempt_number
      - created_at
      properties:
        id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
        event_type:
          type: string
        status:
          type: string
          enum:
          - started
          - succeeded
          - failed
        attempt_number:
          type: integer
          minimum: 1
        error_message:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
          nullable: true
    PublicationUpdate:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 500
        avatar_url:
          type: string
          format: uri
          nullable: true
      additionalProperties: false
    UserFeedEvent:
      type: object
      required:
      - id
      - user_id
      - publication_id
      - event_type
      - payload
      - created_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        publication_id:
          type: string
          format: uuid
        event_type:
          type: string
          description: Subscriber-visible notification type, usually post.published/newsletter.sent.
        payload:
          type: object
        created_at:
          type: string
          format: date-time
        read_at:
          type: string
          format: date-time
          nullable: true
  headers:
    XCorrelationId:
      description: Request correlation ID, also copied into logs/events/errors.
      schema:
        type: string
    IdempotencyReplayed:
      description: '`true` when response was replayed from an idempotency record.'
      schema:
        type: boolean
