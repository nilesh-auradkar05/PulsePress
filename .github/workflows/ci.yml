name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  api:
    name: api (lint · typecheck · test)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pulsepress
          POSTGRES_PASSWORD: pulsepress
          POSTGRES_DB: pulsepress_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pulsepress"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+psycopg://pulsepress:pulsepress@localhost:5432/pulsepress_test
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run ruff check
      - run: uv run pyright
      - run: uv run pytest

  worker:
    name: worker (lint · typecheck · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync
      - run: uv run ruff check
      - run: uv run pyright
      - run: uv run pytest

  web:
    name: web (lint · typecheck · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build

  terraform:
    name: terraform (fmt · validate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive
        working-directory: infra/terraform
      - run: terraform init -backend=false
        working-directory: infra/terraform/environments/dev
      - run: terraform validate
        working-directory: infra/terraform/environments/dev

  guardrails:
    name: guardrails (Sprint 0 CI scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - run: python scripts/ci/validate_openapi.py docs/openapi.yaml
      - run: python scripts/ci/check_docs_links.py docs CLAUDE.md README.md
      - run: python scripts/ci/test_agent_hooks.py
